<div class="profile-info-card" style="margin: 0; display: flex; flex-direction: column; max-height: 90vh;">
  <div class="dialog-header">
    <h4 style="margin: 0; display: flex; align-items: center; gap: 8px;">
      <i class="ph" [class.ph-handshake]="!isEditMode()" [class.ph-pencil-simple]="isEditMode()" style="color: var(--primary); font-size: 1.5rem;"></i>
      {{ isEditMode() ? 'Update Partner' : 'Create Partner' }}
    </h4>
    <a class="close_dialog" (click)="onCancel()"><i class="ph ph-x"></i></a>
  </div>

  <div class="dialog-content" style="padding: 24px; background: var(--a-bg-app); flex: 1; overflow-y: auto;">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="file-upload-section">
        <div class="upload-preview">
          @if (previewUrl()) { <img [src]="previewUrl()" alt="Partner Logo"> } @else { <i class="ph ph-buildings"></i> }
          @if (isUploading()) { <div class="upload-overlay"><div class="spinner-small"></div></div> }
        </div>
        <div class="upload-actions">
          <label class="btn btn-secondary btn-sm" [class.disabled]="isUploading()">
            <i class="ph ph-upload-simple"></i> Upload Logo
            <input type="file" accept="image/*" (change)="onFileSelected($event)" style="display: none;" [disabled]="isUploading()">
          </label>
        </div>
      </div>

      <div class="form-grid">
        <div class="field-group">
          <label>Name <span class="required">*</span></label>
          <input type="text" formControlName="name" placeholder="Enter partner name" [class]="getFieldClass('name')" />
          @if (form.get('name')?.touched && form.get('name')?.errors?.['required']) { <small class="error-message">Name is required.</small> }
        </div>

        <div class="field-group">
          <label>Website URL</label>
          <div class="input-with-icon">
            <i class="ph ph-globe"></i>
            <input type="text" formControlName="website" placeholder="https://example.com" [class]="getFieldClass('website')" style="padding-left: 36px;" />
          </div>
        </div>

        <div class="field-group">
          <label>Partnership Level <span class="required">*</span></label>
          <div class="custom-select">
            <select formControlName="partnershipLevel" [class]="getFieldClass('partnershipLevel')">
              @for (level of partnershipLevels; track level.value) {
                <option [value]="level.value">{{ level.label }}</option>
              }
            </select>
          </div>
        </div>

        <div class="field-group">
          <label>Status <span class="required">*</span></label>
          <div class="custom-select">
            <select formControlName="status" [class]="getFieldClass('status')">
              @for (status of statuses; track status.value) {
                <option [value]="status.value">{{ status.label }}</option>
              }
            </select>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="dialog-actions" style="padding: 16px 24px; border-top: 1px solid var(--a-border-color); display: flex; justify-content: flex-end; gap: 12px; background: var(--a-bg-card);">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isUploading() || globalLoading()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="form.invalid || isUploading() || globalLoading()">
      @if (isUploading() || globalLoading()) { <div class="spinner-small" style="margin-right: 8px;"></div> Saving... } @else { <i class="ph ph-floppy-disk"></i> {{ isEditMode() ? 'Save Changes' : 'Create Partner' }} }
    </button>
  </div>
</div>
