<div class="profile-info-card" style="margin: 0; display: flex; flex-direction: column; max-height: 90vh;">

  <div class="dialog-header">
    <h4 style="margin: 0; display: flex; align-items: center; gap: 8px;">
      <i class="ph ph-car" style="color: var(--primary); font-size: 1.5rem;"></i>
      {{ isEditMode() ? 'Edit Vehicle Make' : 'Add Vehicle Make' }}
    </h4>
    <a class="close_dialog" (click)="onCancel()"><i class="ph ph-x"></i></a>
  </div>

  <div class="dialog-content" style="padding: 24px; background: var(--a-bg-app); flex: 1; overflow-y: auto;">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="file-upload-section">
        <div class="upload-preview">
          @if (previewUrl()) {
            <img [src]="previewUrl()" alt="Make Logo">
          } @else {
            <i class="ph ph-image"></i>
          }
          @if (isUploading()) { <div class="upload-overlay"><div class="spinner-small"></div></div> }
        </div>
        <div class="upload-actions">
          <label class="btn btn-secondary btn-sm" [class.disabled]="isUploading()">
            <i class="ph ph-upload-simple"></i> Upload Make Logo
            <input type="file" accept="image/*" (change)="onFileSelected($event)" style="display: none;" [disabled]="isUploading()">
          </label>
          @if (form.get('logo')?.touched && form.get('logo')?.invalid) {
            <span class="error-message">Logo is required.</span>
          }
        </div>
      </div>

      <div class="form-grid">
        <div class="field-group" [ngClass]="getFieldClass('name')">
          <label>Make Name <span class="required">*</span></label>
          <div class="input-with-icon">
            <i class="ph ph-tag"></i>
            <input type="text" formControlName="name" placeholder="e.g. Toyota, Ford" />
          </div>
          @if (form.get('name')?.touched && form.get('name')?.errors?.['required']) {
            <small class="error-message">Name is required.</small>
          }
        </div>

        <div class="field-group" [ngClass]="getFieldClass('countryOfOrigin')">
          <label>Country of Origin</label>
          <div class="input-with-icon">
            <i class="ph ph-flag"></i>
            <input type="text" formControlName="countryOfOrigin" placeholder="e.g. Japan, Germany" />
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="dialog-actions" style="padding: 16px 24px; border-top: 1px solid var(--a-border-color); display: flex; justify-content: flex-end; gap: 12px; background: var(--a-bg-card);">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isUploading() || globalLoading()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="form.invalid || isUploading() || globalLoading()">
      @if (isUploading() || globalLoading()) { <div class="spinner-small" style="margin-right: 8px;"></div> Saving... } @else { <i class="ph ph-floppy-disk"></i> {{ isEditMode() ? 'Save Changes' : 'Save Make' }} }
    </button>
  </div>
</div>
