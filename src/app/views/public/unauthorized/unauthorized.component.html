<div class="unauthorized-container">
  <div class="unauthorized-card">
    <div class="unauthorized-icon">
      <i class="ph ph-lock-simple"></i>
    </div>
    <h1>Access Denied</h1>
    <p>You don't have permission to access this page. Please contact your administrator or try logging in with a different account.</p>
    <div class="actions">
      <button class="btn btn-primary" (click)="goBack()">
        <i class="ph ph-arrow-left"></i>
        Go Back
      </button>
      <a (click)="help()" class="btn btn-secondary">
        <i class="ph ph-question"></i>
        Help
      </a>
    </div>
  </div>
</div>
