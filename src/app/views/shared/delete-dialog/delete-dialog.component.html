<div class="modal-header" style="border-bottom: none; padding-bottom: 0;">
  <button type="button" class="modal-close" (click)="onCancel()" style="position: absolute; right: 20px; top: 20px;">
    <i class="ph ph-x"></i>
  </button>
</div>

<div class="modal-body" style="padding: 0 2.5rem 2rem; text-align: center;">

  <div class="warning-icon-wrapper" style="width: 72px; height: 72px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
    <i class="ph ph-warning-circle" style="font-size: 38px;"></i>
  </div>

  <h2 style="margin: 0 0 1rem; color: var(--form-error-color); font-size: 1.35rem; font-weight: 600;">
    {{ data.title || 'Confirm Deletion' }}
  </h2>

  <p style="color: var(--a-text-light); margin: 0; line-height: 1.6; font-size: 0.95rem;">
    {{ data.message || 'Are you sure you want to delete this item? This action cannot be undone.' }}
  </p>

  @if (data.itemName) {
    <div style="margin-top: 1.5rem; padding: 1rem; background: var(--a-hover-bg); border-radius: 8px; border: 1px dashed rgba(239, 68, 68, 0.4); text-align: left; display: flex; align-items: center; gap: 1rem;">
      <i class="ph ph-trash" style="font-size: 24px; color: #ef4444;"></i>
      <div>
        <span style="color: var(--a-text-light); font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;">
          {{ data.itemType || 'Target' }} to delete
        </span>
        <div style="font-weight: 600; color: var(--a-text-main); margin-top: 4px; font-size: 1rem;">
          {{ data.itemName }}
        </div>
      </div>
    </div>
  }

</div>

<div class="modal-footer" style="display: flex;justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--a-border-color); border-bottom-left-radius: inherit; border-bottom-right-radius: inherit;">
  <div class="footer-actions" style="display: flex; gap: 1rem; align-items: center;">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" style="padding: 0.6rem 1.2rem;">
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button type="button" class="btn" (click)="onConfirm()" style="background: #ef4444; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);">
      <i class="ph ph-trash"></i> {{ data.confirmText || 'Yes, Delete' }}
    </button>
  </div>
</div>
