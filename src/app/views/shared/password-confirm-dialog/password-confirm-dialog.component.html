<div class="modal-header" style="border-bottom: none; padding-bottom: 0;">
  <button
    type="button"
    class="modal-close"
    (click)="onCancel()"
    style="position: absolute; right: 20px; top: 20px;"
  >
    <i class="ph ph-x"></i>
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="modal-body" style="padding: 0 2.5rem 2rem; text-align: center;">
    <div
      class="warning-icon-wrapper"
      style="width: 72px; height: 72px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;"
    >
      <i class="ph ph-lock-key" style="font-size: 38px;"></i>
    </div>

    <h2
      style="margin: 0 0 1rem; color: var(--a-text-main); font-size: 1.35rem; font-weight: 600;"
    >
      {{ data.title || 'Security Verification' }}
    </h2>

    <p
      style="color: var(--a-text-light); margin: 0 0 1.5rem; line-height: 1.6; font-size: 0.95rem;"
    >
      {{ data.message || 'Please enter your password to confirm this action.' }}
    </p>

    <div style="text-align: left; margin-top: 1rem;">
      <div style="position: relative;">
        <i
          class="ph ph-password"
          style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--a-text-light);"
        ></i>
        <input
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter current password"
          style="width: 100%; padding: 0.8rem 2.5rem 0.8rem 2.5rem; border: 1px solid var(--a-border-color); border-radius: 8px; background: var(--a-bg-card); color: var(--a-text-main);"
          [style.borderColor]="
                form.get('password')?.invalid && form.get('password')?.touched ? '#ef4444' : ''
              "
        />
        <button
          type="button"
          (click)="showPassword.set(!showPassword())"
          style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--a-text-light);"
        >
          <i [class]="showPassword() ? 'ph ph-eye-slash' : 'ph ph-eye'"></i>
        </button>
      </div>
      @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <span style="color: #ef4444; font-size: 0.8rem; margin-top: 6px; display: block;"
        >Password is required.</span
        >
      }
    </div>
  </div>

  <div
    class="modal-footer"
    style="display: flex;justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid var(--a-border-color);"
  >
    <div class="footer-actions" style="display: flex; gap: 1rem; align-items: center;">
      <button
        type="button"
        class="btn btn-secondary"
        (click)="onCancel()"
        style="padding: 0.6rem 1.2rem;"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid"
        style="padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 8px;"
      >
        {{ data.actionText || 'Confirm' }}
      </button>
    </div>
  </div>
</form>
