<header class="page-header">
  <div class="page-title">
    <h1>Testimonials</h1>
    <span class="page-subtitle"><i class="ph ph-chat-centered-dots"></i> Total: 10</span>
  </div>
  <div class="page-actions">
    <button class="btn btn-primary">
      <i class="ph ph-plus"></i> New testimonial
    </button>
  </div>
</header>

<div class="table-card">
  <div class="table-toolbar">
    <div class="filters-group">
      <div class="custom-select">
        <select title="Filter by status">
          <option>Status</option>
          <option>Published</option>
          <option>Draft</option>
          <option>Hidden</option>
        </select>
        <i class="ph ph-caret-down"></i>
      </div>
    </div>

    <div class="bulk-actions">
      <div class="icon-tooltip" data-tooltip="Edit">
        <button class="icon-btn active"><i class="ph ph-pencil-simple"></i></button>
      </div>
      <div class="icon-tooltip" data-tooltip="Delete">
        <button class="icon-btn"><i class="ph ph-trash"></i></button>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="data-table">
      <thead>
      <tr>
        <th width="40">
          <label class="custom-checkbox master-checkbox">
            <input type="checkbox">
            <span class="checkmark indeterminate"></span>
          </label>
        </th>
        <th>NAME <i class="ph ph-caret-up-down"></i></th>
        <th>MESSAGE <i class="ph ph-caret-up-down"></i></th>
        <th>STATUS <i class="ph ph-caret-up-down"></i></th>
        <th>FEATURED <i class="ph ph-caret-up-down"></i></th>
        <th align="right">ACTIONS</th>
      </tr>
      </thead>
      <tbody>
      <tr>
        <td>
          <label class="custom-checkbox">
            <input type="checkbox">
            <span class="checkmark"></span>
          </label>
        </td>
        <td>
          <div class="user-cell">
            <img src="https://i.pravatar.cc/150?u=1" alt="Robert Fox">
            <span>Robert Fox</span>
          </div>
        </td>
        <td>
          <span title="The dashboard has significantly improved our workflow and team collaboration. We couldn't be happier with the results.">The dashboard has significantly improved our workflow and team collaboration...</span>
        </td>
        <td>
          <div class="table-select-wrapper">
            <select class="table-select" title="Change status">
              <option selected>Published</option>
              <option>Draft</option>
              <option>Hidden</option>
            </select>
            <i class="ph ph-caret-down"></i>
          </div>
        </td>
        <td>
          <label class="table-toggle">
            <input type="checkbox" checked>
            <span class="toggle-slider"></span>
          </label>
        </td>
        <td class="actions-cell">
          <div class="dropdown-container" tabindex="0">
            <button class="action-icon"><i class="ph ph-dots-three"></i></button>
            <div class="dropdown-menu">
              <a href="#"><i class="ph ph-pencil-simple"></i> Edit</a>
              <a href="#" class="danger"><i class="ph ph-trash"></i> Delete</a>
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <label class="custom-checkbox">
            <input type="checkbox">
            <span class="checkmark"></span>
          </label>
        </td>
        <td>
          <div class="user-cell">
            <img src="https://i.pravatar.cc/150?u=2" alt="Jane Cooper">
            <span>Jane Cooper</span>
          </div>
        </td>
        <td>
          <span title="Excellent customer support and a very intuitive user interface. Highly recommended for any growing business.">Excellent customer support and a very intuitive user interface...</span>
        </td>
        <td>
          <div class="table-select-wrapper">
            <select class="table-select" title="Change status">
              <option>Published</option>
              <option selected>Draft</option>
              <option>Hidden</option>
            </select>
            <i class="ph ph-caret-down"></i>
          </div>
        </td>
        <td>
          <label class="table-toggle">
            <input type="checkbox">
            <span class="toggle-slider"></span>
          </label>
        </td>
        <td class="actions-cell">
          <div class="dropdown-container" tabindex="0">
            <button class="action-icon"><i class="ph ph-dots-three"></i></button>
            <div class="dropdown-menu">
              <a href="#"><i class="ph ph-pencil-simple"></i> Edit</a>
              <a href="#" class="danger"><i class="ph ph-trash"></i> Delete</a>
            </div>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
